<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Ultime — ALL Templates</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c10;--card:#14141c;--card2:#1c1c28;--accent:#6ee7b7;--accent2:#818cf8;--gold:#fbbf24;--red:#f87171;--text:#f1f5f9;--muted:#64748b;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;padding-bottom:30px;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.brand{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
.reset-btn{background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--red);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;}
.header{background:linear-gradient(160deg,#0a0a14,#10102a,#0a1a14);padding:20px 16px;border-bottom:1px solid var(--border);}
.header h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
.header h1 span{color:var(--accent);}
.header p{color:var(--muted);font-size:13px;margin-bottom:14px;}
.kpi-row{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;}
.kpi-row::-webkit-scrollbar{display:none;}
.kpi-chip{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px 14px;flex-shrink:0;min-width:110px;}
.kpi-val{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;margin-bottom:2px;}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.main{padding:16px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.proj-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.proj-name{font-size:14px;font-weight:700;}
.proj-client{font-size:11px;color:var(--muted);margin-top:1px;}
.proj-tag{font-size:10px;padding:3px 10px;border-radius:100px;font-weight:600;flex-shrink:0;background:rgba(110,231,183,0.1);color:var(--accent);}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
.proj-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:8px;}
.proj-fill{height:100%;border-radius:100px;background:var(--accent);}
.proj-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
.proj-amount{color:var(--accent);font-weight:700;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.task-item:last-child{border-bottom:none;}
.task-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.2s;}
.task-cb.done{background:var(--accent);border-color:var(--accent);}
.task-cb.done::after{content:'✓';font-size:9px;color:#000;font-weight:700;}
.task-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.task-item.done .task-name{text-decoration:line-through;color:var(--muted);}
.task-meta{font-size:11px;color:var(--muted);}
.rev-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.rev-row:last-child{border-bottom:none;}
.rev-source{color:var(--muted);font-size:11px;}
.rev-amount{font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;}
.obj-item{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:10px;}
.obj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.obj-name{font-size:13px;font-weight:600;}
.obj-pct{font-size:13px;font-weight:700;}
.obj-track{height:5px;background:rgba(255,255,255,0.05);border-radius:100px;overflow:hidden;margin-bottom:4px;}
.obj-fill{height:100%;border-radius:100px;background:var(--accent);}
.obj-amounts{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.del-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px;flex-shrink:0;}
.del-btn:hover{color:var(--red);}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.add-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;padding:11px;border-radius:12px;cursor:pointer;margin-top:8px;}
.empty-state{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#1a1a24;border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px 16px 36px;width:100%;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;padding:12px;border-radius:12px;outline:none;}
.field input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer;}
.btn-confirm{flex:2;background:var(--accent);border:none;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;padding:13px;border-radius:12px;cursor:pointer;}
[contenteditable]{outline:none;cursor:text;}
[contenteditable]:focus{background:rgba(255,255,255,0.06);border-radius:4px;padding:1px 3px;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">ALL Templates</span>
  <button class="reset-btn" onclick="resetAll()">🔄 Réinitialiser</button>
</div>
<div class="header">
  <h1>Mon <span>Business</span> de A à Z</h1>
  <p contenteditable data-key="subtitle" onblur="saveField(this)">Pilote ton activité complète.</p>
  <div class="kpi-row">
    <div class="kpi-chip"><div class="kpi-val" style="color:var(--accent)" contenteditable data-key="ca" onblur="saveField(this)">0€</div><div class="kpi-lbl">CA ce mois</div></div>
    <div class="kpi-chip"><div class="kpi-val" style="color:var(--accent2)" id="projCount">0</div><div class="kpi-lbl">Projets actifs</div></div>
    <div class="kpi-chip"><div class="kpi-val" style="color:var(--gold)" contenteditable data-key="attente" onblur="saveField(this)">0€</div><div class="kpi-lbl">En attente</div></div>
    <div class="kpi-chip"><div class="kpi-val" style="color:var(--red)" id="taskCount">0</div><div class="kpi-lbl">Tâches en cours</div></div>
  </div>
</div>

<div class="main">
  <div class="section-title">🚀 Projets</div>
  <div id="projectList"><div class="empty-state">Aucun projet. Appuyez sur + Ajouter.</div></div>
  <button class="add-btn" onclick="openModal('project')">+ Nouveau projet</button>

  <div class="section-title" style="margin-top:16px;">✅ Tâches</div>
  <div class="panel" id="taskList"><div class="empty-state">Aucune tâche.</div></div>
  <button class="add-btn" onclick="openModal('task')">+ Ajouter une tâche</button>

  <div class="section-title" style="margin-top:16px;">💰 Revenus</div>
  <div class="panel" id="revList"><div class="empty-state">Aucun revenu enregistré.</div></div>
  <button class="add-btn" onclick="openModal('rev')">+ Ajouter une ligne</button>

  <div class="section-title" style="margin-top:16px;">🎯 Objectifs</div>
  <div id="objList"><div class="empty-state">Aucun objectif.</div></div>
  <button class="add-btn" onclick="openModal('obj')">+ Ajouter un objectif</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const KEY='business_v2';
let modalMode='';
let data={subtitle:'Pilote ton activité complète.',ca:'0€',attente:'0€',projects:[],tasks:[],revenues:[],objectives:[]};

function load(){const s=localStorage.getItem(KEY);if(s)data=JSON.parse(s);render();}
function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function saveField(el){data[el.dataset.key]=el.textContent;save();}
function resetAll(){if(!confirm('Réinitialiser ?'))return;localStorage.removeItem(KEY);data={subtitle:'Pilote ton activité complète.',ca:'0€',attente:'0€',projects:[],tasks:[],revenues:[],objectives:[]};render();}

function render(){
  ['subtitle','ca','attente'].forEach(k=>{const el=document.querySelector(`[data-key="${k}"]`);if(el)el.textContent=data[k];});
  renderProjects();renderTasks();renderRevenues();renderObjectives();
}

function renderProjects(){
  const l=document.getElementById('projectList');
  document.getElementById('projCount').textContent=data.projects.length;
  if(!data.projects.length){l.innerHTML='<div class="empty-state">Aucun projet.</div>';return;}
  l.innerHTML=data.projects.map((p,i)=>`<div class="project-card"><div class="proj-header"><div><div class="proj-name">${p.name}</div><div class="proj-client">${p.client}</div></div><span class="proj-tag">${p.status}</span></div><div class="prog-row"><span>Avancement</span><span style="color:var(--accent);font-weight:700">${p.progress}%</span></div><div class="proj-bar"><div class="proj-fill" style="width:${p.progress}%"></div></div><div class="proj-footer"><span>${p.deadline}</span><span class="proj-amount">${p.amount}</span><button class="del-btn" onclick="delItem('projects',${i})">✕</button></div></div>`).join('');
}
function renderTasks(){
  const l=document.getElementById('taskList');
  const active=data.tasks.filter(t=>!t.done).length;
  document.getElementById('taskCount').textContent=active;
  if(!data.tasks.length){l.innerHTML='<div class="empty-state">Aucune tâche.</div>';return;}
  l.innerHTML=data.tasks.map((t,i)=>`<div class="task-item ${t.done?'done':''}" onclick="toggleTask(${i})"><div class="task-cb ${t.done?'done':''}"></div><div style="flex:1"><div class="task-name">${t.name}</div><div class="task-meta">${t.meta}</div></div><button class="del-btn" onclick="event.stopPropagation();delItem('tasks',${i})">✕</button></div>`).join('');
}
function renderRevenues(){
  const l=document.getElementById('revList');
  if(!data.revenues.length){l.innerHTML='<div class="empty-state">Aucun revenu.</div>';return;}
  l.innerHTML=data.revenues.map((r,i)=>`<div class="rev-row"><div><div style="font-weight:600">${r.name}</div><div class="rev-source">${r.source}</div></div><div style="display:flex;align-items:center;gap:8px;"><div class="rev-amount" style="color:${r.type==='expense'?'var(--red)':'var(--accent)'}">${r.type==='expense'?'−':'+'}${r.amount}</div><button class="del-btn" onclick="delItem('revenues',${i})">✕</button></div></div>`).join('');
}
function renderObjectives(){
  const l=document.getElementById('objList');
  if(!data.objectives.length){l.innerHTML='<div class="empty-state">Aucun objectif.</div>';return;}
  l.innerHTML=data.objectives.map((o,i)=>`<div class="obj-item"><div class="obj-header"><span class="obj-name">${o.name}</span><span class="obj-pct" style="color:var(--accent)">${o.pct}%</span></div><div class="obj-track"><div class="obj-fill" style="width:${Math.min(o.pct,100)}%"></div></div><div class="obj-amounts"><span>${o.current}</span><span>${o.goal}</span><button class="del-btn" onclick="delItem('objectives',${i})">✕</button></div></div>`).join('');
}

function toggleTask(i){data.tasks[i].done=!data.tasks[i].done;save();renderTasks();}
function delItem(list,i){data[list].splice(i,1);save();render();}

function openModal(m){
  modalMode=m;
  const c=document.getElementById('modalContent');
  const modals={
    project:`<div class="modal-title">Nouveau projet</div><div class="field"><label>Nom du projet</label><input id="f1" placeholder="Ex: Lancement boutique"></div><div class="field"><label>Client / Catégorie</label><input id="f2" placeholder="Ex: Mon business"></div><div class="field"><label>Avancement (%)</label><input id="f3" type="number" placeholder="0" min="0" max="100"></div><div class="field"><label>Deadline</label><input id="f4" placeholder="Ex: 30 Juin"></div><div class="field"><label>Montant / Objectif</label><input id="f5" placeholder="Ex: 2 500€"></div>`,
    task:`<div class="modal-title">Nouvelle tâche</div><div class="field"><label>Tâche</label><input id="f1" placeholder="Ex: Finir les fiches produits"></div><div class="field"><label>Détail / Date</label><input id="f2" placeholder="Ex: Pour demain · Marketing"></div>`,
    rev:`<div class="modal-title">Nouvelle ligne revenus</div><div class="field"><label>Libellé</label><input id="f1" placeholder="Ex: Ventes boutique"></div><div class="field"><label>Source</label><input id="f2" placeholder="Ex: E-commerce"></div><div class="field"><label>Montant</label><input id="f3" placeholder="Ex: 1 200€"></div><div class="field"><label>Type</label><select id="f4"><option value="income">Revenu</option><option value="expense">Dépense</option></select></div>`,
    obj:`<div class="modal-title">Nouvel objectif</div><div class="field"><label>Objectif</label><input id="f1" placeholder="Ex: CA mensuel 10 000€"></div><div class="field"><label>Avancement (%)</label><input id="f3" type="number" placeholder="0"></div><div class="field"><label>Valeur actuelle</label><input id="f4" placeholder="Ex: 0€"></div><div class="field"><label>Objectif cible</label><input id="f5" placeholder="Ex: 10 000€"></div>`
  };
  c.innerHTML=modals[m]+`<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-confirm" onclick="confirmModal()">Ajouter</button></div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function confirmModal(){
  const g=id=>document.getElementById(id)?.value||'';
  if(modalMode==='project')data.projects.push({name:g('f1')||'Nouveau projet',client:g('f2')||'—',progress:parseInt(g('f3'))||0,deadline:g('f4')||'—',status:'En cours',amount:g('f5')||'0€'});
  else if(modalMode==='task')data.tasks.push({name:g('f1')||'Tâche',meta:g('f2')||'—',done:false});
  else if(modalMode==='rev')data.revenues.push({name:g('f1')||'Revenu',source:g('f2')||'—',amount:g('f3')||'0',type:g('f4')||'income'});
  else if(modalMode==='obj')data.objectives.push({name:g('f1')||'Objectif',pct:parseInt(g('f3'))||0,current:g('f4')||'0',goal:g('f5')||'—'});
  save();render();closeModal();
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
load();
</script>
</body>
</html>
